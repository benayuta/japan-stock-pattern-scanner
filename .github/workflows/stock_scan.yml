name: Japan Stock Pattern Scan

on:
  schedule:
    # 08:45 JST
    - cron: '45 23 * * 1-5'

    # 16:00 JST
    - cron: '0 7 * * 1-5'

  workflow_dispatch:

jobs:
  scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run scanner
        run: |
          python src/main.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
